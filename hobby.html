<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Hobbies</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f9f9f9;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        h2 {
            background-color: #90EE90;
            padding: 10px;
            border-radius: 8px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
        }

        .box {
            width: 200px;
        }

        .box img {
            width: 200px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #888;
        }

        a {
            display: inline-block;
            margin-top: 40px;
            text-decoration: none;
            color: #2e7d32;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>My Hobbies</h1>

    <p>
        My hobbies are playing sports like badminton and competitive cycling. 
        I love watching anime and reading comics.
    </p>

    <div class="container">

        <div class="box">
            <h2>Badminton</h2>
            <img src="badminton.jpg" alt="Badminton">
        </div>

        <div class="box">
            <h2>Cycling</h2>
            <img src="cycling.jpg" alt="Cycling">
        </div>

        <div class="box">
            <h2>Watching Anime</h2>
            <img src="anime.jpg" alt="Anime">
        </div>

    </div>

    <!-- BACK BUTTON -->
    <a href="index.html">← Back to Main Page</a>

</body>
</html>
